display_name: DICOMweb VNA/PACS
connection:
  parameters:
    - name: base_url
      type: string
      required: true
      description: >
        Base URL of the DICOMweb endpoint, including any path prefix.
        Example: https://your-pacs.example.com/dicom-web

    - name: auth_type
      type: string
      required: false
      description: >
        Authentication method. One of: none, basic, bearer.
        Defaults to none for open endpoints.

    - name: username
      type: string
      required: false
      description: >
        Username for HTTP Basic authentication.
        Required when auth_type is set to basic.

    - name: password
      type: string
      required: false
      secret: true
      description: >
        Password for HTTP Basic authentication.
        Required when auth_type is set to basic.

    - name: token
      type: string
      required: false
      secret: true
      description: >
        Bearer token for token-based authentication.
        Required when auth_type is set to bearer.

external_options_allowlist: "fetch_dicom_files,dicom_volume_path,lookback_days,page_size,start_date,download_threads,max_concurrent_requests,fetch_metadata,wado_mode"
